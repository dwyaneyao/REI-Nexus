<!doctype html>
<html lang="zh-Hans">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>KotobaVault</title>
    <link rel="icon" href="../../../assets/rei-nexus-mark.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./styles.css?v=20260601-browser-single-save">
  </head>
  <body>
    <div id="libraryView" class="app-shell library-shell">
      <header class="library-header">
        <div class="brand">
          <p class="brand-kicker">KotobaVault</p>
          <h1>教材库</h1>
        </div>
      </header>

      <main id="categoryList" class="category-list" aria-live="polite"></main>
    </div>

    <div id="studyShell" class="app-shell" hidden>
      <header class="topbar">
        <div class="brand">
          <p class="brand-kicker">KotobaVault</p>
          <h1 id="studyTitle">日文学习库</h1>
        </div>
        <div class="topbar-controls">
          <button id="backToLibraryButton" class="secondary-button" type="button">教材库</button>
          <label class="source-picker" hidden>
            <span>教材</span>
            <select id="sourceSelect" aria-label="教材"></select>
          </label>
          <label class="unit-picker">
            <span>单元课程</span>
            <select id="unitSelect" aria-label="单元课程"></select>
          </label>
        </div>
      </header>

      <main class="main-grid">
        <aside class="side-panel" aria-label="学习状态">
          <section class="panel">
            <h2>进度</h2>
            <div class="stats-grid">
              <div>
                <span id="statTotal" class="stat-value">0</span>
                <span id="statTotalLabel" class="stat-label">词条</span>
              </div>
              <div>
                <span id="statDue" class="stat-value">0</span>
                <span id="statDueLabel" class="stat-label">今日计划</span>
              </div>
              <div>
                <span id="statStudiedToday" class="stat-value">0</span>
                <span id="statStudiedTodayLabel" class="stat-label">今日已学</span>
              </div>
              <div>
                <span id="statStreak" class="stat-value">0</span>
                <span id="statStreakLabel" class="stat-label">连续天数</span>
              </div>
              <div>
                <span id="statLearning" class="stat-value">0</span>
                <span id="statLearningLabel" class="stat-label">学习中</span>
              </div>
              <div>
                <span id="statMastered" class="stat-value">0</span>
                <span id="statMasteredLabel" class="stat-label">已掌握</span>
              </div>
            </div>
          </section>

          <section class="panel">
            <h2 id="filterTitle">筛选</h2>
            <div class="filter-stack" role="group" aria-label="掌握状态筛选">
              <button class="filter-button active" data-filter="all" type="button">全部</button>
              <button class="filter-button" data-filter="new" type="button">未学</button>
              <button class="filter-button" data-filter="due" type="button">到期</button>
              <button class="filter-button" data-filter="learning" type="button">学习中</button>
              <button class="filter-button" data-filter="mastered" type="button">已掌握</button>
            </div>
          </section>

          <section class="panel">
            <h2>打卡</h2>
            <p id="checkinStatus" class="panel-note">今天还没有打卡。</p>
            <button id="checkinButton" class="primary-button full-button" type="button">今日打卡</button>
          </section>
        </aside>

        <section class="workspace" aria-live="polite">
          <div class="toolbar">
            <label class="search-box">
              <span>搜索</span>
              <input id="searchInput" type="search" placeholder="日文、假名、中文意思或编号">
            </label>
            <div class="view-tabs" role="tablist" aria-label="视图">
              <button class="tab-button active" data-view="today" type="button" role="tab">今日</button>
              <button class="tab-button" data-view="list" type="button" role="tab">词表</button>
              <button class="tab-button" data-view="cards" type="button" role="tab">卡片</button>
              <button class="tab-button" data-view="quiz" type="button" role="tab">小测</button>
              <button class="tab-button" data-view="review" type="button" role="tab">复习</button>
              <button class="tab-button" data-view="log" type="button" role="tab">记录</button>
            </div>
          </div>

          <section id="todayView" class="view-section">
            <div id="learningTodayShell">
              <div class="today-head">
                <div>
                  <h2>今日学习</h2>
                  <p id="todaySummary">正在读取复习计划。</p>
                </div>
                <button id="startTodayButton" class="primary-button" type="button">开始今日学习</button>
              </div>
              <div class="today-grid">
                <section class="today-column">
                  <h3>到期复习</h3>
                  <div id="dueList" class="review-list"></div>
                </section>
                <section class="today-column">
                  <h3 id="newContentHeading">新词建议</h3>
                  <div id="newWordList" class="review-list"></div>
                </section>
              </div>
            </div>
            <div id="practiceOverviewShell" class="practice-overview" hidden></div>
          </section>

          <section id="listView" class="view-section" hidden>
            <div id="vocabularyListShell" class="table-shell">
              <table>
                <thead>
                  <tr>
                    <th>编号</th>
                    <th id="termHeader">词</th>
                    <th id="readingHeader">读音</th>
                    <th id="typeHeader">词性</th>
                    <th id="meaningHeader">意思</th>
                    <th>下次复习</th>
                    <th>状态</th>
                  </tr>
                </thead>
                <tbody id="wordTableBody"></tbody>
              </table>
            </div>
            <div id="practiceListShell" class="practice-list-shell" hidden></div>
          </section>

          <section id="cardsView" class="view-section" hidden>
            <div id="studyCardShell" class="study-card">
              <div class="card-mode-bar" aria-label="卡片出题显示">
                <span>出题显示</span>
                <div class="segmented-control">
                  <button class="prompt-mode-button active" data-prompt-mode="term" type="button">汉字</button>
                  <button class="prompt-mode-button" data-prompt-mode="reading" type="button">假名</button>
                </div>
              </div>
              <div class="card-meta">
                <span id="cardCounter">0 / 0</span>
                <span id="cardStatus" class="status-pill">未学</span>
              </div>
              <p id="cardTerm" class="card-term">-</p>
              <p id="cardReading" class="card-reading hidden-answer">-</p>
              <p id="cardMeaning" class="card-meaning hidden-answer">-</p>
              <div id="cardExamples" class="card-examples hidden-answer"></div>
              <div class="card-actions">
                <button id="prevCardButton" type="button">上一张</button>
                <button id="revealCardButton" class="primary-button" type="button">显示答案</button>
                <button id="practiceGrammarButton" class="primary-button" type="button" hidden>练习这个文法点</button>
                <button id="nextCardButton" type="button">下一张</button>
              </div>
              <div id="cardReviewControls" class="review-controls" aria-label="复习反馈"></div>
              <div id="cardStatusControls" class="status-controls" aria-label="卡片掌握状态"></div>
            </div>
          </section>

          <section id="quizView" class="view-section" hidden>
            <div class="quiz-panel">
              <div class="card-meta">
                <span id="quizCounter">0 / 0</span>
                <span id="quizModeLabel">填空小测</span>
              </div>
              <div id="practiceQuizTools" class="practice-quiz-tools" hidden></div>
              <div id="quizContext" class="quiz-context" hidden></div>
              <div id="quizPrompt" class="quiz-prompt">-</div>
              <div id="quizChoices" class="quiz-choices"></div>
              <label id="quizAnswerBox" class="answer-box">
                <span>你的答案</span>
                <input id="quizAnswer" type="text" autocomplete="off">
              </label>
              <div id="quizFeedback" class="quiz-feedback" aria-live="polite"></div>
              <div id="quizActions" class="card-actions">
                <button id="checkQuizButton" class="primary-button" type="button">检查</button>
                <button id="prevQuizButton" type="button">上一题</button>
                <button id="showQuizAnswerButton" type="button">看答案</button>
                <button id="nextQuizButton" type="button">下一题</button>
              </div>
            </div>
          </section>

          <section id="reviewView" class="view-section" hidden>
            <div class="review-header">
              <h2>待复习</h2>
              <p id="reviewSummary">还没有数据。</p>
            </div>
            <div id="reviewList" class="review-list"></div>
          </section>

          <section id="logView" class="view-section" hidden>
            <section id="lessonResetPanel" class="lesson-reset-panel" hidden>
              <div>
                <h2>本课重置</h2>
                <p id="lessonResetSummary">清空当前课程的学习状态。</p>
              </div>
              <button id="resetLessonButton" class="danger-button" type="button">重置本课学习状态</button>
            </section>
            <div class="log-grid">
              <section>
                <div class="review-header">
                  <h2>打卡记录</h2>
                  <p id="checkinSummary">还没有打卡记录。</p>
                </div>
                <div id="checkinList" class="timeline-list"></div>
              </section>
              <section>
                <div class="review-header">
                  <h2>学习记录</h2>
                  <p id="eventSummary">还没有学习记录。</p>
                </div>
                <div id="eventList" class="timeline-list"></div>
              </section>
            </div>
          </section>
        </section>
      </main>
    </div>

    <script src="./main.js?v=20260601-browser-single-save"></script>
  </body>
</html>
