<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light">
    <title>REI Nexus</title>
    <link rel="stylesheet" href="./assets/styles.css">
  </head>
  <body>
    <main class="site-shell">
      <header class="site-header" aria-label="站点标题">
        <a class="brand" href="./index.html" aria-label="REI Nexus 首页">
          <img src="./assets/rei-nexus-mark.svg" alt="" width="40" height="40">
          <span>REI Nexus</span>
        </a>
        <nav class="top-nav" aria-label="主导航">
          <a href="./tools/blank/">空白预览</a>
          <a href="https://github.com/dwyaneyao/REI-Nexus">GitHub</a>
        </nav>
      </header>

      <section class="workspace" aria-labelledby="page-title">
        <div class="workspace-title">
          <p class="eyebrow">HTML Tools Platform</p>
          <h1 id="page-title">REI Nexus</h1>
        </div>

        <div class="tool-grid" aria-label="工具列表">
          <article class="tool-card">
            <div>
              <p class="tool-kicker">Template</p>
              <h2>空白预览</h2>
              <p>一个干净的页面容器，可作为新工具的起点。</p>
            </div>
            <a class="button" href="./tools/blank/">打开</a>
          </article>

          <article class="tool-card muted">
            <div>
              <p class="tool-kicker">Next</p>
              <h2>等待添加</h2>
              <p>后续工具会显示在这里。</p>
            </div>
            <span class="button ghost" aria-disabled="true">预留</span>
          </article>
        </div>
      </section>
    </main>
  </body>
</html>
